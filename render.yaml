services:
  - type: web
    name: khetbuddy-fertilizer-api
    env: python
    region: singapore          # closest region to India
    plan: free
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
